{% extends "index.html" %}

{% block content %}
        <!--Add expense Overlay -->
        
        {% for p in pay %}
        <form method="POST"  action="{% url 'khata:edit_expense' p.id %}">
        {% csrf_token %}
        <div  class="fixed inset-0 z-50 text-gray-200 flex items-center pt-5 justify-center p-4
            bg-slate-900/20 backdrop-blur-sm">
          <!-- Glass card -->
          <div class="w-full max-w-lg md:max-w-2xl rounded-2xl
              bg-white dark:bg-gray-900
              backdrop-blur-xl backdrop-saturate-150
              border border-white/20 dark:border-white/10
              shadow-2xl ring-1 ring-black/5 p-6">


            <!-- Amount -->
            <div class="w-full dark:text-white text-black mx-20 text-lg ">Payer: 
              <button type="button" id="toggleActionBtn"
                class="px-3 block md:inline py-1 text-center text-sm rounded-lg border-[3px] border-indigo-700 bg-indigo-700 text-white transition duration-300">
                {{p.payer | capfirst}}
              </button>
            </div>
            <div>
              <label class="block  dark:text-white text-black  text-base sm:text-lg font-medium">Amount (₹)</label>
              <input type="text" id="priceInput" name="price" placeholder="Amount: 10+78+35+...." value="{{p.amount}}" class="w-full dark:text-white text-black/100  rounded-xl border dark:border-white/30 border-black/30 bg-gray-100 
                dark:bg-black/10 dark:border-black/10
                px-4 py-3 text-base sm:text-lg
                placeholder-gray-500 outline-none
                focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500/60" required>
            </div>

            <!-- Description -->
            <div>
              <label class="block dark:text-white text-black  text-base sm:text-lg font-medium">Description</label>
              <input type="text" name="desc" placeholder="Ex: Movie, Dinner, Shopping..." value="{{p.description}}" class="w-full dark:text-white text-black/100  rounded-xl border dark:border-white/30 border-black/30 bg-gray-100
                      dark:bg-black/10 dark:border-black/10
                      px-4 py-3 text-base sm:text-lg
                      placeholder-gray-500 outline-none
                      focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500/60" required>
            </div>

            <!-- Buttons -->
             <input type="text" hidden value="{{p.group_id}}" name="group" >
            <div class="block" >
              <div class="flex gap-3 mt-5 ">
                <button type="submit"  class="flex-1 rounded-xl px-4 py-3 text-white text-lg sm:text-xl
                        bg-indigo-600/90 hover:bg-indigo-600 active:bg-indigo-700
                        shadow-lg shadow-indigo-600/20">
                  Update
                </button>
                <a href="{% url 'khata:admin_page' p.group_id %}" class="flex-1 rounded-xl px-4 py-3 text-white text-center text-lg sm:text-xl
                    bg-rose-600/90 hover:bg-rose-600 active:bg-rose-700
                    shadow-lg shadow-rose-600/20">
                  Cancel
                </a>
              </div>
                <div class="mx-auto my-5 flex items-center justify-center " >

                  <a href={% url "khata:delete_expense" p.group_id p.id %} class="block rounded-xl px-4 py-3 text-white text-lg sm:text-xl
                  bg-red-600/90 hover:bg-red-600 active:bg-indigo-700
                  shadow-lg shadow-indigo-600/20">
                  Delete Record
                </a>
              </div>
            </div>
          </div>
        </div>
    </form>

    
        {% endfor %}
{% endblock content %}
